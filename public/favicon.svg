<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Navy background -->
  <rect width="32" height="32" rx="6" fill="#0f1322"/>
  <!-- White document -->
  <rect x="7" y="4" width="18" height="24" rx="2" fill="#ffffff"/>
  <!-- Blue header bar -->
  <rect x="7" y="4" width="18" height="9" rx="2" fill="#2563eb"/>
  <rect x="7" y="10" width="18" height="3" fill="#2563eb"/>
  <!-- Avatar circle -->
  <circle cx="12" cy="8.5" r="2.5" fill="#ffffff"/>
  <!-- Name lines in header -->
  <rect x="16" y="7" width="7" height="1.5" rx="0.75" fill="#ffffff" opacity="0.9"/>
  <rect x="16" y="9.5" width="5" height="1" rx="0.5" fill="#ffffff" opacity="0.6"/>
  <!-- Section label -->
  <rect x="9" y="15" width="14" height="1.5" rx="0.75" fill="#2563eb"/>
  <!-- Content lines -->
  <rect x="9" y="18" width="12" height="1" rx="0.5" fill="#dde2f0"/>
  <rect x="9" y="20.5" width="9" height="1" rx="0.5" fill="#dde2f0"/>
  <!-- Second section label -->
  <rect x="9" y="24" width="14" height="1.5" rx="0.75" fill="#2563eb" opacity="0.7"/>
</svg>
